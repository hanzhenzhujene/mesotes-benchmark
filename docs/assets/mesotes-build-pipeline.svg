<svg width="1400" height="820" viewBox="0 0 1400 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">How MESOTES is built</title>
  <desc id="desc">A cleaner four-phase benchmark construction figure showing target definition, formalization, data construction, and evaluation/reporting.</desc>
  <defs>
    <style>
      .title { fill: #1E2A38; font-family: Georgia, 'Times New Roman', serif; font-size: 42px; font-weight: 700; }
      .subtitle { fill: #556270; font-family: Arial, Helvetica, sans-serif; font-size: 20px; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 1px; }
      .cardtitle { fill: #1E2A38; font-family: Arial, Helvetica, sans-serif; font-size: 26px; font-weight: 700; }
      .body { fill: #425164; font-family: Arial, Helvetica, sans-serif; font-size: 18px; }
      .outcome { fill: #FFFFFF; font-family: Arial, Helvetica, sans-serif; font-size: 20px; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#93A1AF"/>
    </marker>
  </defs>

  <rect width="1400" height="820" rx="28" fill="#F7F3EA"/>
  <rect x="32" y="32" width="1336" height="756" rx="24" fill="#FFFDFC" stroke="#D8CFC1" stroke-width="2"/>

  <text x="72" y="96" class="title">How MESOTES is built</text>
  <text x="72" y="126" class="subtitle">The benchmark is built as a research pipeline: define the target, formalize it, construct hard data, then score behavior.</text>

  <rect x="72" y="170" width="280" height="420" rx="24" fill="#FFF8E8" stroke="#DDBB73" stroke-width="2"/>
  <text x="98" y="206" class="label" fill="#8A5B00">PHASE A / TARGET</text>
  <text x="98" y="248" class="cardtitle">Define what success means</text>
  <text x="98" y="296" class="body">Aristotelian judgment,</text>
  <text x="98" y="322" class="body">not generic right-or-wrong agreement.</text>
  <text x="98" y="370" class="body">Focus on framework fidelity,</text>
  <text x="98" y="396" class="body">salience, and practical judgment.</text>
  <rect x="98" y="452" width="228" height="78" rx="16" fill="#FFFFFF"/>
  <text x="118" y="484" class="label" fill="#8A5B00">OUTPUT OF THIS PHASE</text>
  <text x="118" y="514" class="body">A clear evaluation target.</text>

  <rect x="392" y="170" width="280" height="420" rx="24" fill="#EEF6FF" stroke="#7AA8D8" stroke-width="2"/>
  <text x="418" y="206" class="label" fill="#0B57D0">PHASE B / FORMALIZATION</text>
  <text x="418" y="248" class="cardtitle">Turn philosophy into a task</text>
  <text x="418" y="296" class="body">Fix the ontology:</text>
  <text x="418" y="322" class="body">spheres, explanation tags,</text>
  <text x="418" y="348" class="body">phronesis labels, exceptions.</text>
  <text x="418" y="396" class="body">Lock the record schema:</text>
  <text x="418" y="422" class="body">scenario, agent profile, actions,</text>
  <text x="418" y="448" class="body">structured gold labels.</text>
  <rect x="418" y="452" width="228" height="78" rx="16" fill="#FFFFFF"/>
  <text x="438" y="484" class="label" fill="#0B57D0">OUTPUT OF THIS PHASE</text>
  <text x="438" y="514" class="body">A predictable annotation format.</text>

  <rect x="712" y="170" width="280" height="420" rx="24" fill="#F3ECFF" stroke="#A58AD6" stroke-width="2"/>
  <text x="738" y="206" class="label" fill="#6C3FB2">PHASE C / DATA CONSTRUCTION</text>
  <text x="738" y="248" class="cardtitle">Build hard benchmark items</text>
  <text x="738" y="296" class="body">Author concrete scenarios with</text>
  <text x="738" y="322" class="body">role, timing, stakes, and motive.</text>
  <text x="738" y="370" class="body">Add false midpoint traps,</text>
  <text x="738" y="396" class="body">needs-more-info cases,</text>
  <text x="738" y="422" class="body">no-mean exceptions, and families.</text>
  <rect x="738" y="452" width="228" height="78" rx="16" fill="#FFFFFF"/>
  <text x="758" y="484" class="label" fill="#6C3FB2">OUTPUT OF THIS PHASE</text>
  <text x="758" y="514" class="body">Adversarial, reviewable data.</text>

  <rect x="1032" y="170" width="296" height="420" rx="24" fill="#EAF8F0" stroke="#75B58E" stroke-width="2"/>
  <text x="1058" y="206" class="label" fill="#0A7E3B">PHASE D / EVALUATION</text>
  <text x="1058" y="248" class="cardtitle">Run, score, and interpret</text>
  <text x="1058" y="296" class="body">Export prompts and collect</text>
  <text x="1058" y="322" class="body">structured model predictions.</text>
  <text x="1058" y="370" class="body">Compute core metrics,</text>
  <text x="1058" y="396" class="body">family metrics, and</text>
  <text x="1058" y="422" class="body">adjudication summaries.</text>
  <rect x="1058" y="452" width="244" height="78" rx="16" fill="#FFFFFF"/>
  <text x="1078" y="484" class="label" fill="#0A7E3B">OUTPUT OF THIS PHASE</text>
  <text x="1078" y="514" class="body">A benchmark report, not just a score.</text>

  <path d="M352 380H392" stroke="#93A1AF" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M672 380H712" stroke="#93A1AF" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M992 380H1032" stroke="#93A1AF" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="72" y="640" width="1256" height="74" rx="18" fill="#1E2A38"/>
  <text x="100" y="684" class="outcome">Outcome: a framework-fidelity benchmark for Aristotelian judgment, with adversarial item design, counterfactual family analysis, and review-aware evaluation.</text>
</svg>
