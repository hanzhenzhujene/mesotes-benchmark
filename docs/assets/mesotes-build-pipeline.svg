<svg width="1400" height="940" viewBox="0 0 1400 940" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">How MESOTES is built</title>
  <desc id="desc">A paper-style benchmark construction figure showing four phases: philosophical target, formalization, dataset construction, and evaluation/reporting.</desc>
  <defs>
    <style>
      .title { fill: #1E2A38; font-family: Georgia, 'Times New Roman', serif; font-size: 42px; font-weight: 700; }
      .subtitle { fill: #556270; font-family: Arial, Helvetica, sans-serif; font-size: 21px; }
      .phaselabel { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 1px; }
      .cardtitle { fill: #1E2A38; font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 700; }
      .body { fill: #425164; font-family: Arial, Helvetica, sans-serif; font-size: 18px; }
      .outcome { fill: #FFFFFF; font-family: Arial, Helvetica, sans-serif; font-size: 20px; }
      .num { fill: #FFFFFF; font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#93A1AF"/>
    </marker>
  </defs>

  <rect width="1400" height="940" rx="28" fill="#F7F3EA"/>
  <rect x="32" y="32" width="1336" height="876" rx="24" fill="#FFFDFC" stroke="#D8CFC1" stroke-width="2"/>

  <text x="72" y="96" class="title">How MESOTES is built</text>
  <text x="72" y="128" class="subtitle">The benchmark is constructed as a layered research pipeline:</text>
  <text x="72" y="154" class="subtitle">philosophical target, formalization, adversarial data design, and structured evaluation.</text>

  <rect x="72" y="182" width="292" height="40" rx="20" fill="#FFF5E8" stroke="#DDBB73" stroke-width="2"/>
  <text x="98" y="207" class="phaselabel" fill="#8A5B00">PHASE A / TARGET</text>
  <rect x="398" y="182" width="292" height="40" rx="20" fill="#EEF6FF" stroke="#7AA8D8" stroke-width="2"/>
  <text x="424" y="207" class="phaselabel" fill="#0B57D0">PHASE B / FORMALIZATION</text>
  <rect x="724" y="182" width="292" height="40" rx="20" fill="#F3ECFF" stroke="#A58AD6" stroke-width="2"/>
  <text x="750" y="207" class="phaselabel" fill="#6C3FB2">PHASE C / DATA</text>
  <rect x="1050" y="182" width="278" height="40" rx="20" fill="#EAF8F0" stroke="#75B58E" stroke-width="2"/>
  <text x="1076" y="207" class="phaselabel" fill="#0A7E3B">PHASE D / EVALUATION</text>

  <rect x="72" y="248" width="292" height="246" rx="22" fill="#FFF8E8" stroke="#DDBB73" stroke-width="2"/>
  <circle cx="110" cy="280" r="18" fill="#8A5B00"/>
  <text x="104" y="286" class="num">1</text>
  <text x="136" y="286" class="cardtitle">Define the target</text>
  <text x="96" y="334" class="body">Measure Aristotelian judgment,</text>
  <text x="96" y="360" class="body">not generic right-or-wrong agreement.</text>
  <text x="96" y="406" class="body">Focus on framework fidelity,</text>
  <text x="96" y="432" class="body">salience, and practical judgment.</text>

  <rect x="398" y="248" width="292" height="246" rx="22" fill="#EEF6FF" stroke="#7AA8D8" stroke-width="2"/>
  <circle cx="436" cy="280" r="18" fill="#0B57D0"/>
  <text x="430" y="286" class="num">2</text>
  <text x="462" y="286" class="cardtitle">Encode the ontology</text>
  <text x="422" y="334" class="body">Fix the spheres, explanation tags,</text>
  <text x="422" y="360" class="body">phronesis labels, and exceptions.</text>
  <text x="422" y="406" class="body">Turn philosophy into a controlled</text>
  <text x="422" y="432" class="body">annotation vocabulary.</text>

  <rect x="398" y="520" width="292" height="246" rx="22" fill="#EEF6FF" stroke="#7AA8D8" stroke-width="2"/>
  <circle cx="436" cy="560" r="18" fill="#0B57D0"/>
  <text x="430" y="566" class="num">3</text>
  <text x="462" y="566" class="cardtitle">Lock the record schema</text>
  <text x="422" y="614" class="body">Scenario + agent profile +</text>
  <text x="422" y="640" class="body">four candidate actions + gold labels.</text>
  <text x="422" y="686" class="body">Make judgment prediction</text>
  <text x="422" y="712" class="body">a structured task, not one verdict.</text>

  <rect x="724" y="248" width="292" height="246" rx="22" fill="#F3ECFF" stroke="#A58AD6" stroke-width="2"/>
  <circle cx="762" cy="280" r="18" fill="#6C3FB2"/>
  <text x="756" y="286" class="num">4</text>
  <text x="788" y="286" class="cardtitle">Author concrete cases</text>
  <text x="748" y="334" class="body">Write plausible scenarios with</text>
  <text x="748" y="360" class="body">role, stakes, timing, and motive.</text>
  <text x="748" y="406" class="body">Avoid cartoonish actions and</text>
  <text x="748" y="432" class="body">avoid direct moral label leakage.</text>

  <rect x="724" y="520" width="292" height="246" rx="22" fill="#F3ECFF" stroke="#A58AD6" stroke-width="2"/>
  <circle cx="762" cy="560" r="18" fill="#6C3FB2"/>
  <text x="756" y="566" class="num">5</text>
  <text x="788" y="566" class="cardtitle">Add hard structures</text>
  <text x="748" y="614" class="body">Build false midpoint traps,</text>
  <text x="748" y="640" class="body">needs-more-info items, and no-mean cases.</text>
  <text x="748" y="686" class="body">Force models to do more than</text>
  <text x="748" y="712" class="body">pick the balanced-looking answer.</text>

  <rect x="1050" y="248" width="278" height="246" rx="22" fill="#EAF8F0" stroke="#75B58E" stroke-width="2"/>
  <circle cx="1088" cy="280" r="18" fill="#0A7E3B"/>
  <text x="1082" y="286" class="num">6</text>
  <text x="1114" y="286" class="cardtitle">Add families and review</text>
  <text x="1074" y="334" class="body">Group variants into families:</text>
  <text x="1074" y="360" class="body">base, salience, agent, role, detail.</text>
  <text x="1074" y="406" class="body">Track confidence, disagreement,</text>
  <text x="1074" y="432" class="body">and adjudication metadata.</text>

  <rect x="1050" y="520" width="278" height="246" rx="22" fill="#EAF8F0" stroke="#75B58E" stroke-width="2"/>
  <circle cx="1088" cy="560" r="18" fill="#0A7E3B"/>
  <text x="1082" y="566" class="num">7</text>
  <text x="1114" y="566" class="cardtitle">Run and score the benchmark</text>
  <text x="1074" y="614" class="body">Export prompts, collect model</text>
  <text x="1074" y="640" class="body">predictions, compute metrics.</text>
  <text x="1074" y="686" class="body">Report both item accuracy and</text>
  <text x="1074" y="712" class="body">counterfactual family behavior.</text>

  <path d="M364 367H398" stroke="#A4AFBB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M690 367H724" stroke="#A4AFBB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1016 367H1050" stroke="#A4AFBB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M544 494V520" stroke="#A4AFBB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M870 494V520" stroke="#A4AFBB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1188 494V520" stroke="#A4AFBB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="72" y="812" width="1256" height="70" rx="18" fill="#1E2A38"/>
  <text x="100" y="846" class="outcome">Outcome: a framework-fidelity benchmark for Aristotelian judgment,</text>
  <text x="100" y="870" class="outcome">with adversarial item design, family analysis, and review-aware evaluation.</text>
</svg>
