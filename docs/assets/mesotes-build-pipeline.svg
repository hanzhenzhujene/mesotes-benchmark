<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">How MESOTES is built</title>
  <desc id="desc">A paper-style pipeline figure showing how MESOTES is built: philosophical target, operational ontology, schema design, adversarial item authoring, counterfactual families, adjudication metadata, and evaluation outputs.</desc>

  <rect width="1400" height="900" rx="28" fill="#F7F3EA"/>
  <rect x="32" y="32" width="1336" height="836" rx="24" fill="#FFFDFC" stroke="#D8CFC1" stroke-width="2"/>

  <text x="72" y="96" fill="#1E2A38" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700">
    How MESOTES is built
  </text>
  <text x="72" y="132" fill="#52606D" font-family="Arial, Helvetica, sans-serif" font-size="21">
    The benchmark is constructed as a pipeline from philosophical target to structured evaluation, not as a flat collection of right-or-wrong cases.
  </text>

  <rect x="72" y="170" width="1256" height="92" rx="18" fill="#FFF5E8" stroke="#DDBB73" stroke-width="2"/>
  <text x="98" y="208" fill="#8A5B00" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    CENTRAL BUILD PRINCIPLE
  </text>
  <text x="98" y="238" fill="#243242" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Convert Aristotelian practical judgment into a benchmark that can be authored,
  </text>
  <text x="98" y="266" fill="#243242" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    reviewed, predicted, scored, and stress-tested.
  </text>

  <rect x="72" y="292" width="284" height="212" rx="20" fill="#FFF8E8" stroke="#DDBB73" stroke-width="2"/>
  <text x="96" y="328" fill="#8A5B00" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    1. PHILOSOPHICAL TARGET
  </text>
  <text x="96" y="364" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Define what counts as
  </text>
  <text x="96" y="394" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Aristotelian success
  </text>
  <text x="96" y="432" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    framework fidelity
  </text>
  <text x="96" y="458" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    not public-opinion agreement
  </text>
  <text x="96" y="484" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    not generic moral fluency
  </text>

  <rect x="392" y="292" width="284" height="212" rx="20" fill="#EEF6FF" stroke="#7AA8D8" stroke-width="2"/>
  <text x="416" y="328" fill="#0B57D0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    2. OPERATIONAL ONTOLOGY
  </text>
  <text x="416" y="364" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Turn philosophy into
  </text>
  <text x="416" y="394" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    controlled labels
  </text>
  <text x="416" y="432" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    8 core spheres
  </text>
  <text x="416" y="458" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    explanation tags
  </text>
  <text x="416" y="484" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    phronesis and exception labels
  </text>

  <rect x="712" y="292" width="284" height="212" rx="20" fill="#F3ECFF" stroke="#A58AD6" stroke-width="2"/>
  <text x="736" y="328" fill="#6C3FB2" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    3. RECORD SCHEMA
  </text>
  <text x="736" y="364" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Make each case a
  </text>
  <text x="736" y="394" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    structured judgment task
  </text>
  <text x="736" y="432" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    scenario + agent profile
  </text>
  <text x="736" y="458" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    four candidate actions
  </text>
  <text x="736" y="484" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    gold roles + rationale tags
  </text>

  <rect x="1032" y="292" width="296" height="212" rx="20" fill="#EAF8F0" stroke="#75B58E" stroke-width="2"/>
  <text x="1056" y="328" fill="#0A7E3B" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    4. ADVERSARIAL ITEM DESIGN
  </text>
  <text x="1056" y="364" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Build hard cases that
  </text>
  <text x="1056" y="394" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    expose shallow balance
  </text>
  <text x="1056" y="432" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    false midpoint traps
  </text>
  <text x="1056" y="458" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    needs-more-info cases
  </text>
  <text x="1056" y="484" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    no-mean exceptions
  </text>

  <path d="M356 398H392" stroke="#B79B66" stroke-width="4" stroke-linecap="round"/>
  <path d="M676 398H712" stroke="#6D95C1" stroke-width="4" stroke-linecap="round"/>
  <path d="M996 398H1032" stroke="#8F78BE" stroke-width="4" stroke-linecap="round"/>

  <rect x="72" y="556" width="388" height="214" rx="20" fill="#FFF1EF" stroke="#D88C82" stroke-width="2"/>
  <text x="96" y="592" fill="#B74C3D" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    5. COUNTERFACTUAL FAMILY DESIGN
  </text>
  <text x="96" y="628" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Decide when a model
  </text>
  <text x="96" y="658" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    should stay the same
  </text>
  <text x="96" y="688" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    and when it should shift
  </text>
  <text x="96" y="726" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    base + minimal pair
  </text>
  <text x="96" y="752" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    irrelevant-detail, salience, agent, role shifts
  </text>

  <rect x="506" y="556" width="388" height="214" rx="20" fill="#EEF3FA" stroke="#8FA8C1" stroke-width="2"/>
  <text x="530" y="592" fill="#35516F" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    6. ANNOTATION QUALITY CONTROL
  </text>
  <text x="530" y="628" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Preserve uncertainty,
  </text>
  <text x="530" y="658" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    disagreement, and
  </text>
  <text x="530" y="688" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    human adjudication
  </text>
  <text x="530" y="726" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    confidence labels
  </text>
  <text x="530" y="752" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    disagreement flags + adjudication notes
  </text>

  <rect x="940" y="556" width="388" height="214" rx="20" fill="#F5F0E8" stroke="#B8A58B" stroke-width="2"/>
  <text x="964" y="592" fill="#6D4C41" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    7. BENCHMARK PIPELINE
  </text>
  <text x="964" y="628" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Export prompts, collect
  </text>
  <text x="964" y="658" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    predictions, score runs,
  </text>
  <text x="964" y="688" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    summarize findings
  </text>
  <text x="964" y="726" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    core metrics + family metrics
  </text>
  <text x="964" y="752" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    reports + adjudication summaries
  </text>

  <path d="M1180 504V532" stroke="#8CA68E" stroke-width="4" stroke-linecap="round"/>
  <path d="M854 504V532" stroke="#9E86C8" stroke-width="4" stroke-linecap="round"/>
  <path d="M534 504V532" stroke="#6F94C0" stroke-width="4" stroke-linecap="round"/>

  <rect x="72" y="794" width="1256" height="58" rx="14" fill="#1E2A38"/>
  <text x="98" y="832" fill="#F8F7F2" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">
    Outcome:
  </text>
  <text x="198" y="824" fill="#F8F7F2" font-family="Arial, Helvetica, sans-serif" font-size="19">
    a framework-fidelity benchmark for structured Aristotelian judgment,
  </text>
  <text x="198" y="846" fill="#F8F7F2" font-family="Arial, Helvetica, sans-serif" font-size="19">
    with adversarial cases, family analysis, and review-aware evaluation.
  </text>
</svg>
