<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MESOTES overview</title>
  <desc id="desc">A visual overview of the MESOTES benchmark, showing purpose, Aristotelian task structure, and counterfactual family evaluation.</desc>
  <rect width="1200" height="620" rx="28" fill="#F7F3EA"/>
  <rect x="36" y="36" width="1128" height="548" rx="24" fill="#FFFDFC" stroke="#D8CFC1" stroke-width="2"/>

  <text x="70" y="98" fill="#1E2A38" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700">
    MESOTES
  </text>
  <text x="70" y="132" fill="#4A5562" font-family="Arial, Helvetica, sans-serif" font-size="20">
    An Aristotelian benchmark for phronesis, the doctrine of the mean, and counterfactual moral reasoning
  </text>

  <rect x="70" y="170" width="500" height="148" rx="20" fill="#FFF8E8" stroke="#DDBB73" stroke-width="2"/>
  <text x="95" y="208" fill="#8A5B00" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    WHAT MESOTES IS TRYING TO MEASURE
  </text>
  <text x="95" y="246" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Can a model reason Aristotelianly in context
  </text>
  <text x="95" y="279" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="20">
    rather than merely producing ethical-sounding answers?
  </text>

  <rect x="600" y="170" width="520" height="148" rx="20" fill="#EEF6FF" stroke="#7AA8D8" stroke-width="2"/>
  <text x="625" y="208" fill="#0B57D0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    PILOT V2 SNAPSHOT
  </text>
  <text x="625" y="248" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">
    32 items • 8 spheres • 8 families
  </text>
  <text x="625" y="282" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="19">
    30 false-midpoint cases • 7 needs-more-info • 6 no-mean exceptions
  </text>

  <rect x="70" y="352" width="220" height="164" rx="18" fill="#F3ECFF" stroke="#A58AD6" stroke-width="2"/>
  <text x="94" y="388" fill="#6C3FB2" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    STEP 1
  </text>
  <text x="94" y="424" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Find the
  </text>
  <text x="94" y="454" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    relevant sphere
  </text>
  <text x="94" y="492" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    fear, anger, honor,
  </text>
  <text x="94" y="516" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    truthfulness, humor, etc.
  </text>

  <rect x="330" y="352" width="220" height="164" rx="18" fill="#EAF8F0" stroke="#75B58E" stroke-width="2"/>
  <text x="354" y="388" fill="#0A7E3B" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    STEP 2
  </text>
  <text x="354" y="424" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Distinguish
  </text>
  <text x="354" y="454" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    deficiency / excess /
  </text>
  <text x="354" y="484" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    mean
  </text>

  <rect x="590" y="352" width="220" height="164" rx="18" fill="#FFF1EF" stroke="#D88C82" stroke-width="2"/>
  <text x="614" y="388" fill="#B74C3D" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    STEP 3
  </text>
  <text x="614" y="424" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Reject fake
  </text>
  <text x="614" y="454" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    moderation
  </text>
  <text x="614" y="492" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    the balanced-looking
  </text>
  <text x="614" y="516" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    answer can still be wrong
  </text>

  <rect x="850" y="352" width="270" height="164" rx="18" fill="#EEF3FA" stroke="#8FA8C1" stroke-width="2"/>
  <text x="874" y="388" fill="#35516F" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    STEP 4
  </text>
  <text x="874" y="424" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    Test phronesis and
  </text>
  <text x="874" y="454" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">
    counterfactual change
  </text>
  <text x="874" y="492" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    does the model ask for more info,
  </text>
  <text x="874" y="516" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    stay stable, and shift when needed?
  </text>

  <path d="M290 434H330" stroke="#9A8BAF" stroke-width="4" stroke-linecap="round"/>
  <path d="M550 434H590" stroke="#89A98E" stroke-width="4" stroke-linecap="round"/>
  <path d="M810 434H850" stroke="#B18A84" stroke-width="4" stroke-linecap="round"/>

  <text x="70" y="560" fill="#6A7684" font-family="Arial, Helvetica, sans-serif" font-size="17">
    MESOTES is framework-fidelity oriented: it scores structured Aristotelian judgment, not generic verdict prediction.
  </text>
</svg>
