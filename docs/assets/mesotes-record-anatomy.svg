<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MESOTES record anatomy</title>
  <desc id="desc">A record anatomy figure showing the left-to-right flow from model input to prediction target, with analysis metadata separated as a third layer.</desc>
  <defs>
    <style>
      .title { fill: #1E2A38; font-family: Georgia, 'Times New Roman', serif; font-size: 36px; font-weight: 700; }
      .subtitle { fill: #556270; font-family: Arial, Helvetica, sans-serif; font-size: 19px; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 1px; }
      .cardtitle { fill: #1E2A38; font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 700; }
      .body { fill: #425164; font-family: Arial, Helvetica, sans-serif; font-size: 18px; }
      .small { fill: #425164; font-family: Arial, Helvetica, sans-serif; font-size: 16px; }
      .footer { fill: #FFFFFF; font-family: Arial, Helvetica, sans-serif; font-size: 18px; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#93A1AF"/>
    </marker>
  </defs>

  <rect width="1200" height="640" rx="26" fill="#FCFAF6"/>
  <rect x="28" y="28" width="1144" height="584" rx="22" fill="#FFFDFC" stroke="#DDD4C8" stroke-width="2"/>

  <text x="60" y="88" class="title">One MESOTES record</text>
  <text x="60" y="120" class="subtitle">The unit of evaluation is a structured judgment problem, not a single moral verdict.</text>

  <rect x="60" y="154" width="468" height="350" rx="22" fill="#FFF8E8" stroke="#DDBB73" stroke-width="2"/>
  <text x="88" y="192" class="label" fill="#8A5B00">WHAT THE MODEL SEES</text>
  <rect x="88" y="214" width="412" height="78" rx="16" fill="#FFFFFF"/>
  <rect x="88" y="308" width="412" height="78" rx="16" fill="#FFFFFF"/>
  <rect x="88" y="402" width="412" height="78" rx="16" fill="#FFFFFF"/>
  <text x="110" y="244" class="cardtitle">1. Scenario</text>
  <text x="110" y="270" class="small">domain • split • scenario text</text>
  <text x="110" y="338" class="cardtitle">2. Agent profile</text>
  <text x="110" y="364" class="small">role • experience_level • resource_position • power_relation</text>
  <text x="110" y="432" class="cardtitle">3. Candidate actions</text>
  <text x="110" y="458" class="small">exactly four plausible response options</text>

  <path d="M528 330H590" stroke="#93A1AF" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="620" y="154" width="520" height="350" rx="22" fill="#EAF8F0" stroke="#75B58E" stroke-width="2"/>
  <text x="648" y="192" class="label" fill="#0A7E3B">WHAT THE MODEL MUST PREDICT</text>
  <rect x="648" y="214" width="464" height="168" rx="18" fill="#FFFFFF"/>
  <text x="672" y="246" class="cardtitle">Gold structure</text>
  <text x="672" y="278" class="body">primary_sphere</text>
  <text x="672" y="304" class="body">relevant_factors</text>
  <text x="672" y="330" class="body">deficiency / excess / mean / false_midpoint</text>
  <text x="672" y="356" class="body">phronesis_salience • needs_more_info • no_mean_exception</text>

  <rect x="648" y="402" width="464" height="78" rx="18" fill="#FFF1EF" stroke="#D88C82" stroke-width="2"/>
  <text x="672" y="432" class="label" fill="#B74C3D">USED FOR ANALYSIS, NOT PREDICTION</text>
  <text x="672" y="462" class="small">family_id • variant_type • annotation_confidence • disagreement_flags • adjudication_note</text>

  <rect x="60" y="540" width="1080" height="42" rx="14" fill="#1E2A38"/>
  <text x="84" y="566" class="footer">Evaluation flow: model input on the left, structured target on the right, review and family metadata underneath.</text>
</svg>
