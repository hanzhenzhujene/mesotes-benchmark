<svg width="1200" height="540" viewBox="0 0 1200 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MESOTES record anatomy</title>
  <desc id="desc">A diagram showing the main fields inside one MESOTES record: scenario, agent profile, candidate actions, structured gold labels, and family metadata.</desc>
  <rect width="1200" height="540" rx="26" fill="#FCFAF6"/>
  <rect x="26" y="26" width="1148" height="488" rx="20" fill="#FFFDFC" stroke="#DDD4C8" stroke-width="2"/>

  <text x="58" y="84" fill="#1E2A38" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">
    One MESOTES record
  </text>
  <text x="58" y="118" fill="#566270" font-family="Arial, Helvetica, sans-serif" font-size="20">
    The dataset unit is a structured judgment problem, not a single verdict label.
  </text>

  <rect x="58" y="156" width="290" height="144" rx="18" fill="#FFF7E3" stroke="#D8B360" stroke-width="2"/>
  <text x="82" y="193" fill="#8A5B00" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    SCENARIO LAYER
  </text>
  <text x="82" y="229" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">
    scenario
  </text>
  <text x="82" y="257" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    domain
  </text>
  <text x="82" y="283" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    split
  </text>

  <rect x="372" y="156" width="290" height="144" rx="18" fill="#EEF6FF" stroke="#7BA8D6" stroke-width="2"/>
  <text x="396" y="193" fill="#0B57D0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    AGENT LAYER
  </text>
  <text x="396" y="229" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">
    role
  </text>
  <text x="396" y="257" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    experience_level
  </text>
  <text x="396" y="283" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    resource_position / power_relation
  </text>

  <rect x="686" y="156" width="456" height="144" rx="18" fill="#F3ECFF" stroke="#A58AD6" stroke-width="2"/>
  <text x="710" y="193" fill="#6C3FB2" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    CHOICE LAYER
  </text>
  <text x="710" y="229" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">
    4 candidate actions
  </text>
  <text x="710" y="257" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    deficiency candidate
  </text>
  <text x="710" y="283" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    excess candidate • mean candidate • false midpoint candidate
  </text>

  <rect x="58" y="330" width="520" height="144" rx="18" fill="#EAF8F0" stroke="#72B28B" stroke-width="2"/>
  <text x="82" y="367" fill="#0A7E3B" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    GOLD STRUCTURE
  </text>
  <text x="82" y="403" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">
    primary_sphere
  </text>
  <text x="82" y="431" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    relevant_factors • deficiency / excess / mean
  </text>
  <text x="82" y="457" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    phronesis_salience • needs_more_info • no_mean_exception
  </text>

  <rect x="604" y="330" width="538" height="144" rx="18" fill="#FFF1EF" stroke="#D78D82" stroke-width="2"/>
  <text x="628" y="367" fill="#B74C3D" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
    RESEARCH VALIDATION LAYER
  </text>
  <text x="628" y="403" fill="#1E2A38" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">
    family_id / variant_type
  </text>
  <text x="628" y="431" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    annotation_confidence • disagreement_flags
  </text>
  <text x="628" y="457" fill="#425164" font-family="Arial, Helvetica, sans-serif" font-size="18">
    adjudication_note • author_intended_trap_type
  </text>
</svg>
