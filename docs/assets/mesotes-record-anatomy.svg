<svg width="1200" height="660" viewBox="0 0 1200 660" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MESOTES record anatomy</title>
  <desc id="desc">A clearer record anatomy figure showing what a model sees, what it must predict, and which fields are used for counterfactual and adjudication analysis.</desc>
  <defs>
    <style>
      .title { fill: #1E2A38; font-family: Georgia, 'Times New Roman', serif; font-size: 36px; font-weight: 700; }
      .subtitle { fill: #556270; font-family: Arial, Helvetica, sans-serif; font-size: 19px; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 1px; }
      .cardtitle { fill: #1E2A38; font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; }
      .body { fill: #425164; font-family: Arial, Helvetica, sans-serif; font-size: 17px; }
      .mini { fill: #425164; font-family: Arial, Helvetica, sans-serif; font-size: 15px; }
      .footer { fill: #FFFFFF; font-family: Arial, Helvetica, sans-serif; font-size: 17px; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#93A1AF"/>
    </marker>
  </defs>

  <rect width="1200" height="660" rx="26" fill="#FCFAF6"/>
  <rect x="28" y="28" width="1144" height="604" rx="22" fill="#FFFDFC" stroke="#DDD4C8" stroke-width="2"/>

  <text x="60" y="88" class="title">One MESOTES record</text>
  <text x="60" y="120" class="subtitle">The dataset unit is a structured judgment problem with a clear split between</text>
  <text x="60" y="146" class="subtitle">model input, prediction target, and analysis metadata.</text>

  <rect x="60" y="164" width="92" height="34" rx="17" fill="#FFF5E8" stroke="#DDBB73" stroke-width="2"/>
  <text x="84" y="186" class="label" fill="#8A5B00">INPUT</text>
  <rect x="168" y="164" width="108" height="34" rx="17" fill="#EAF8F0" stroke="#75B58E" stroke-width="2"/>
  <text x="192" y="186" class="label" fill="#0A7E3B">TARGET</text>
  <rect x="292" y="164" width="124" height="34" rx="17" fill="#FFF1EF" stroke="#D88C82" stroke-width="2"/>
  <text x="316" y="186" class="label" fill="#B74C3D">ANALYSIS</text>

  <rect x="60" y="226" width="204" height="262" rx="20" fill="#FFF8E8" stroke="#DDBB73" stroke-width="2"/>
  <text x="84" y="262" class="label" fill="#8A5B00">INPUT BLOCK 1</text>
  <text x="84" y="302" class="cardtitle">Scenario</text>
  <text x="84" y="342" class="body">domain</text>
  <text x="84" y="368" class="body">split</text>
  <text x="84" y="394" class="body">scenario text</text>
  <text x="84" y="434" class="mini">Concrete situation.</text>
  <text x="84" y="456" class="mini">No direct label leakage.</text>

  <rect x="288" y="226" width="204" height="262" rx="20" fill="#EEF6FF" stroke="#7AA8D8" stroke-width="2"/>
  <text x="312" y="262" class="label" fill="#0B57D0">INPUT BLOCK 2</text>
  <text x="312" y="302" class="cardtitle">Agent profile</text>
  <text x="312" y="342" class="body">role</text>
  <text x="312" y="368" class="body">experience_level</text>
  <text x="312" y="394" class="body">resource_position</text>
  <text x="312" y="420" class="body">power_relation</text>
  <text x="312" y="454" class="mini">Makes person-relative</text>
  <text x="312" y="476" class="mini">judgment possible.</text>

  <rect x="516" y="226" width="228" height="262" rx="20" fill="#F3ECFF" stroke="#A58AD6" stroke-width="2"/>
  <text x="540" y="262" class="label" fill="#6C3FB2">INPUT BLOCK 3</text>
  <text x="540" y="302" class="cardtitle">Candidate actions</text>
  <rect x="540" y="330" width="180" height="34" rx="10" fill="#FFFFFF"/>
  <rect x="540" y="374" width="180" height="34" rx="10" fill="#FFFFFF"/>
  <rect x="540" y="418" width="180" height="34" rx="10" fill="#FFFFFF"/>
  <rect x="540" y="462" width="180" height="34" rx="10" fill="#FFFFFF"/>
  <text x="558" y="352" class="mini">a1 plausible response</text>
  <text x="558" y="396" class="mini">a2 plausible response</text>
  <text x="558" y="440" class="mini">a3 plausible response</text>
  <text x="558" y="484" class="mini">a4 plausible response</text>

  <rect x="768" y="226" width="196" height="262" rx="20" fill="#EAF8F0" stroke="#75B58E" stroke-width="2"/>
  <text x="792" y="262" class="label" fill="#0A7E3B">TARGET BLOCK</text>
  <text x="792" y="302" class="cardtitle">Gold structure</text>
  <text x="792" y="342" class="body">primary_sphere</text>
  <text x="792" y="368" class="body">relevant_factors</text>
  <text x="792" y="394" class="body">deficiency / excess / mean</text>
  <text x="792" y="420" class="body">false_midpoint_action_id</text>
  <text x="792" y="446" class="body">phronesis_salience</text>
  <text x="792" y="472" class="body">needs_more_info / no_mean_exception</text>

  <rect x="988" y="226" width="152" height="262" rx="20" fill="#FFF1EF" stroke="#D88C82" stroke-width="2"/>
  <text x="1012" y="262" class="label" fill="#B74C3D">ANALYSIS</text>
  <text x="1012" y="302" class="cardtitle">Family / review</text>
  <text x="1012" y="342" class="body">family_id</text>
  <text x="1012" y="368" class="body">variant_type</text>
  <text x="1012" y="394" class="body">annotation_confidence</text>
  <text x="1012" y="420" class="body">disagreement_flags</text>
  <text x="1012" y="446" class="body">adjudication_note</text>

  <path d="M264 356H288" stroke="#A4AFBB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M492 356H516" stroke="#A4AFBB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M744 356H768" stroke="#A4AFBB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M964 356H988" stroke="#A4AFBB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="60" y="526" width="1080" height="72" rx="16" fill="#1E2A38"/>
  <text x="88" y="560" class="footer">During evaluation, the model sees the scenario, agent profile, and candidate actions,</text>
  <text x="88" y="584" class="footer">then predicts the gold structure. Family and review fields support analysis and quality control.</text>
</svg>
